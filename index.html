<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vanguard SSH - Pro Edition</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <style>
    /* Global Styles */
    body { background: #0f0f0f; color: #eee; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
    
    /* Sidebar */
    .sidebar { width: 300px; background: #181818; border-right: 1px solid #333; display: flex; flex-direction: column; }
    .sidebar-header { padding: 25px 20px; font-weight: bold; color: #4e4eff; border-bottom: 1px solid #222; font-size: 1.2rem; letter-spacing: 1px; }
    
    .tab-buttons { display: flex; padding: 10px; gap: 5px; border-bottom: 1px solid #333; background: #121212; }
    .tab-btn { flex: 1; background: #2a2a2a; color: #aaa; border: 1px solid #444; padding: 8px; cursor: pointer; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
    .tab-btn:hover { background: #333; color: white; }
    .tab-btn.active { background: #4e4eff; color: white; border-color: #4e4eff; }
    
    /* Lists */
    .server-list, .file-list { flex: 1; overflow-y: auto; padding: 15px; }
    .server-item, .file-item { padding: 12px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; background: #222; font-size: 0.85rem; border: 1px solid transparent; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .server-item:hover, .file-item:hover { background: #2a2a2a; border-color: #4e4eff; }
    
    .folder { color: #ffca28; font-weight: bold; }
    .dl-btn { background: #2e7d32; color: white; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: bold; visibility: hidden; }
    .file-item:hover .dl-btn { visibility: visible; }

    /* Main Content */
    .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; background: #0c0c0c; }
    .controls { display: flex; gap: 10px; margin-bottom: 20px; background: #181818; padding: 15px; border-radius: 10px; border: 1px solid #333; }
    
    input { background: #252525; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; flex: 1; font-size: 0.9rem; outline: none; }
    input:focus { border-color: #4e4eff; }
    
    button#connectBtn { background: #4e4eff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    button#saveBtn { background: #333; color: #ccc; border: 1px solid #555; padding: 10px 15px; border-radius: 6px; cursor: pointer; }

    #terminal-container { flex: 1; background: #000; border-radius: 10px; border: 1px solid #333; overflow: hidden; padding: 10px; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">VANGUARD</div>
    
    <div class="tab-buttons">
      <button id="hostsTab" class="tab-btn active" onclick="showTab('hosts')">Hosts</button>
      <button id="filesTab" class="tab-btn" onclick="showTab('files')">Files</button>
    </div>
    
    <div id="serverList" class="server-list"></div>
    
    <div id="fileExplorer" class="file-list" style="display:none;">
      <button id="uploadBtn" style="width:100%; margin-bottom:10px; background:#2e7d32; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer; font-size:11px;">⬆️ UPLOAD FILE</button>
      <div id="currentPath" style="font-size: 11px; color: #4e4eff; margin-bottom: 15px; font-family: monospace; word-break: break-all;">/</div>
      <div id="filesContainer">Connect to browse...</div>
    </div>
  </div>

  <div class="main-content">
    <div class="controls">
      <input id="serverName" placeholder="Nickname" style="flex: 0.5;" />
      <input id="host" placeholder="IP Address" />
      <input id="user" placeholder="User" />
      <input id="pass" type="password" placeholder="Pass" />
      <button id="connectBtn">Connect</button>
      <button id="saveBtn">Save</button>
    </div>
    <div id="terminal-container"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const { Terminal } = require('@xterm/xterm');
    const { FitAddon } = require('@xterm/addon-fit');
    const fs = require('fs');
    const path = require('path');

    // --- PRODUCTION PATH LOGIC ---
    // This asks the Main process for the correct AppData path
    const userDataPath = ipcRenderer.sendSync('get-user-data-path');
    const configPath = path.join(userDataPath, 'servers.json');

    // 1. Terminal Init
    const term = new Terminal({
      cursorBlink: true,
      theme: { background: '#000000', foreground: '#ffffff' },
      fontSize: 14
    });
    const fitAddon = new FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal-container'));
    fitAddon.fit();
    window.onresize = () => fitAddon.fit();

    // 2. Tabs
    function showTab(tab) {
      document.getElementById('serverList').style.display = tab === 'hosts' ? 'block' : 'none';
      document.getElementById('fileExplorer').style.display = tab === 'files' ? 'block' : 'none';
      document.getElementById('hostsTab').classList.toggle('active', tab === 'hosts');
      document.getElementById('filesTab').classList.toggle('active', tab === 'files');
    }

    // 3. Server Management
    function loadServers() {
      if (!fs.existsSync(userDataPath)) fs.mkdirSync(userDataPath, { recursive: true });
      if (!fs.existsSync(configPath)) fs.writeFileSync(configPath, '[]');
      
      const servers = JSON.parse(fs.readFileSync(configPath, 'utf8'));
      const list = document.getElementById('serverList');
      list.innerHTML = '';
      servers.forEach(s => {
        const item = document.createElement('div');
        item.className = 'server-item';
        item.innerHTML = `<div><strong>${s.name}</strong><br><small>${s.user}@${s.host}</small></div>`;
        item.onclick = () => {
          document.getElementById('serverName').value = s.name;
          document.getElementById('host').value = s.host;
          document.getElementById('user').value = s.user;
          document.getElementById('pass').focus();
        };
        list.appendChild(item);
      });
    }

    document.getElementById('saveBtn').onclick = () => {
      const servers = JSON.parse(fs.readFileSync(configPath, 'utf8'));
      servers.push({
        name: document.getElementById('serverName').value || 'Server',
        host: document.getElementById('host').value,
        user: document.getElementById('user').value
      });
      fs.writeFileSync(configPath, JSON.stringify(servers, null, 2));
      loadServers();
    };

    // 4. File Explorer & SFTP
    ipcRenderer.on('sftp-list', (event, { path: remotePath, files }) => {
      const container = document.getElementById('filesContainer');
      document.getElementById('currentPath').innerText = remotePath;
      container.innerHTML = '';

      if (remotePath !== '.' && remotePath !== '/') {
        const back = document.createElement('div');
        back.className = 'file-item folder';
        back.innerHTML = `<span>⬅️ .. (Parent)</span>`;
        // Handle path logic safely
        back.onclick = () => ipcRenderer.send('sftp-ls', remotePath.split('/').slice(0, -1).join('/') || '/');
        container.appendChild(back);
      }

      files.forEach(file => {
        const isDir = (file.attrs.mode & 0o040000) !== 0;
        const item = document.createElement('div');
        item.className = `file-item ${isDir ? 'folder' : ''}`;
        const dlBtn = !isDir ? `<button class="dl-btn" onclick="downloadFile(event, '${remotePath}/${file.filename}', '${file.filename}')">DL</button>` : '';
        item.innerHTML = `<span>${isDir ? '📁' : '📄'} ${file.filename}</span> ${dlBtn}`;
        if (isDir) item.onclick = () => ipcRenderer.send('sftp-ls', `${remotePath}/${file.filename}`);
        container.appendChild(item);
      });
    });

    function downloadFile(e, remotePath, filename) {
      e.stopPropagation();
      ipcRenderer.send('sftp-download', { remotePath, filename });
    }

    document.getElementById('uploadBtn').onclick = () => {
      ipcRenderer.send('sftp-upload', { remoteDir: document.getElementById('currentPath').innerText });
    };

    // 5. Connection
    document.getElementById('connectBtn').onclick = () => {
      const host = document.getElementById('host').value;
      const username = document.getElementById('user').value;
      const password = document.getElementById('pass').value;
      term.writeln(`\x1b[33m>>> Connecting to ${host}...\x1b[0m`);
      ipcRenderer.send('ssh-connect', { host, username, password });
    };

    term.onData(data => ipcRenderer.send('ssh-input', data));
    ipcRenderer.on('ssh-data', (event, data) => term.write(data));
    ipcRenderer.on('ssh-status', (event, status) => { term.writeln(`\x1b[32m[+] ${status}\x1b[0m\r\n`); term.focus(); });
    ipcRenderer.on('ssh-error', (event, msg) => term.writeln(`\x1b[31m[!] Error: ${msg}\x1b[0m`));

    loadServers();
  </script>
</body>
</html>
